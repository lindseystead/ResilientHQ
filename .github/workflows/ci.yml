name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Run linter
        run: npm run lint

      - name: Check feature boundaries
        run: npm run lint:architecture

      - name: Check import cycles
        run: npm run lint:cycles

      - name: Check design token usage
        run: npm run lint:design

      - name: Check Firestore governance
        run: npm run lint:firestore

      - name: Check dependency hygiene
        run: npm run deps:check

      - name: Check unused source files
        run: npm run unused:files

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm run test:ci

      - name: Enforce coverage ratchet
        run: npm run coverage:ratchet

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  security:
    name: Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dependency review (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=critical

  web-bundle:
    name: Web Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Fails if the app cannot bundle (e.g. an unbundleable dynamic import or a
      # missing Babel/Metro config) — a defect that unit tests do not catch.
      - name: Export web bundle
        run: npx expo export --platform web --output-dir dist

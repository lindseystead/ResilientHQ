name: Native Checks

# Heavier, environment-dependent checks (Expo config audit and an Android
# emulator smoke test). These are expensive and are run on demand rather than
# gating every push, so the CI badge reflects the fast quality gate.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-check:
    name: Build Check (Expo)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Advisory: this project uses the bare workflow with committed native
      # folders, so expo-doctor's Prebuild/config-sync and some transitive
      # dedupe checks are expected. Surfaced here, not treated as a hard gate.
      - name: Check build configuration (advisory)
        run: npx expo-doctor
        continue-on-error: true

      - name: Verify app config
        run: npx expo config --type public

  mobile-e2e-smoke:
    name: Mobile E2E Smoke (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Maestro CLI
        run: curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: Add Maestro to PATH
        run: echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Build Android debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Run Maestro smoke flow on emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          MAESTRO_APP_ID: com.lindsea89.resilientportfolio
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            npm run e2e:maestro:smoke
